<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief 07 — Blog del Mundial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <h1 class="brand-title">🏆 Mundial<span>Blog</span></h1>
            <p class="brand-subtitle">Estadísticas, previas, análisis tácticos y crónicas de partido</p>
        </div>
    </header>

    <main class="container">
        <section id="controls-section" class="controls-section">
            <div class="search-box">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
                <input type="text" id="search-input" placeholder="Buscar artículo por título o etiqueta..." aria-label="Buscar artículos">
            </div>
            <div id="chips-container" class="chips-container" role="tablist" aria-label="Filtrar por categoría"></div>
        </section>

        <section id="home-view" class="home-view">
            <div id="posts-grid" class="posts-grid"></div>
        </section>

        <section id="detail-view" class="detail-view hidden">
            <div class="back-nav">
                <button id="back-btn" class="btn-back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Volver al inicio
                </button>
            </div>
            
            <article id="article-content" class="full-article"></article>

            <nav class="post-navigation" aria-label="Navegación entre artículos">
                <button id="prev-post-btn" class="btn-nav">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Anterior
                </button>
                <button id="next-post-btn" class="btn-nav">
                    Siguiente
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </nav>

            <section class="related-section">
                <h3 class="related-title">Artículos relacionados</h3>
                <div id="related-posts-grid" class="posts-grid"></div>
            </section>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Blog del Mundial. Diseñado con Vanilla Web Standards.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
